version: "3.9"

services:

  bot:
    build: .
    container_name: pocketfm_bot
    restart: always
    volumes:
      - ./downloads:/app/downloads
      - ./l3.wvd:/app/l3.wvd
      - ./pocketfm.db:/app/pocketfm.db

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: always
    environment:
      TELEGRAM_API_ID: "${API_ID}"
      TELEGRAM_API_HASH: "${API_HASH}"
      TELEGRAM_LOCAL: "true"
    volumes:
      - ./downloads:/app/downloads
